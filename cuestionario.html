<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cuestionario de Autoevaluación — ISO 9001:2015</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #2e7d32;
    --primary-dark: #1b5e20;
    --light-bg: #f8f9f8;
    --white: #ffffff;
    --text: #212529;
    --border: #d1d5db;
    --shadow: 0 2px 8px rgba(0,0,0,.08);
    --g50: #e8f5e9; --g400: #4caf50;
    --a50: #fff3e0; --a400: #ff9800;
    --r50: #ffebee; --r400: #f44336;
    --gray50: #f5f5f5;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--light-bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 60px;
  }
  .header {
    background: var(--primary-dark);
    padding: 20px 40px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: var(--shadow);
  }
  .header-inner {
    max-width: 1100px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
  }
  .header-left {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .badge {
    background: rgba(255,255,255,.15);
    border: 1px solid rgba(255,255,255,.3);
    border-radius: 9999px;
    padding: 6px 14px;
    font-size: 13px;
    font-weight: 600;
    color: #c8e6c9;
  }
  .header h1 {
    font-size: 22px;
    font-weight: 600;
    color: white;
    line-height: 1.3;
  }
  .header p {
    font-size: 13px;
    color: #c8e6c9;
    margin-top: 2px;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 20px;
    border-radius: 9999px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    border: none;
    transition: all .2s;
  }
  .btn-secondary {
    background: rgba(255,255,255,.15);
    color: white;
    border: 1px solid rgba(255,255,255,.25);
  }
  .btn-primary {
    background: white;
    color: var(--primary-dark);
    font-weight: 600;
  }
  .main {
    max-width: 1100px;
    margin: 30px auto 0;
    padding: 0 20px;
  }
  .score-section {
    background: var(--white);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 24px;
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
  }
  .score-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 16px;
  }
  .score-metric {
    text-align: center;
    padding: 16px;
    background: #f8f9f8;
    border-radius: 10px;
  }
  .score-metric .val {
    font-size: 28px;
    font-weight: 700;
  }
  #overall-pct {
    font-size: 36px;
    font-weight: 700;
    text-align: center;
    margin-top: 20px;
  }
  .section {
    background: var(--white);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 24px;
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
  }
  .section-header {
    display: flex;
    align-items: center;
    gap: 16px;
    cursor: pointer;
    margin-bottom: 20px;
  }
  .section-icon {
    font-size: 28px;
    width: 48px;
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #e8f5e9;
    border-radius: 10px;
  }
  .question-card {
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
    margin-bottom: 16px;
    background: white;
  }
  .q-header {
    display: flex;
    gap: 12px;
    margin-bottom: 16px;
  }
  .q-num {
    font-weight: 600;
    color: var(--primary);
    min-width: 60px;
  }
  .q-text {
    font-size: 15px;
    line-height: 1.5;
  }
  .radio-group {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 16px;
  }
  .radio-opt {
    padding: 10px 18px;
    border: 1px solid var(--border);
    border-radius: 9999px;
    font-size: 14px;
    cursor: pointer;
    transition: all .2s;
    background: white;
  }
  .radio-opt:hover { background: #f8f9f8; }
  .radio-opt input { display: none; }
  .radio-opt.sel-C { background: var(--g50); border-color: var(--g400); color: #2e7d32; }
  .radio-opt.sel-P { background: var(--a50); border-color: var(--a400); color: #e65100; }
  .radio-opt.sel-NC { background: var(--r50); border-color: var(--r400); color: #c62828; }
  .radio-opt.sel-NA { background: var(--gray50); border-color: #9e9e9e; color: #616161; }
  .q-notes {
    width: 100%;
    min-height: 80px;
    padding: 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 14px;
    resize: vertical;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="header-left">
      <div class="badge">ISO 9001:2015</div>
      <div>
        <h1>Cuestionario de Autoevaluación — Sistema de Gestión de la Calidad</h1>
        <p>Simulación para cualquier empresa • Cláusulas 4 a 10</p>
      </div>
    </div>
    <div>
      <button class="btn btn-secondary" onclick="resetAll()">↺ Reiniciar</button>
      <button class="btn btn-primary" onclick="generateResults()">📋 Ver resultados</button>
      <button class="btn btn-primary" onclick="window.print()">🖨 Imprimir / PDF</button>
    </div>
  </div>
</div>

<div class="main">
  <!-- Resumen de cumplimiento -->
  <div class="score-section">
    <h2 style="font-size:16px;font-weight:600;margin-bottom:12px">Resumen de cumplimiento</h2>
    <div class="score-grid">
      <div class="score-metric"><div class="val" id="cnt-c" style="color:#2e7d32">0</div><div style="font-size:13px;color:#555">Conforme</div></div>
      <div class="score-metric"><div class="val" id="cnt-p" style="color:#ff9800">0</div><div style="font-size:13px;color:#555">Parcialmente</div></div>
      <div class="score-metric"><div class="val" id="cnt-nc" style="color:#f44336">0</div><div style="font-size:13px;color:#555">No conforme</div></div>
      <div class="score-metric"><div class="val" id="cnt-na" style="color:#757575">0</div><div style="font-size:13px;color:#555">No aplica</div></div>
    </div>
    <div id="overall-pct" style="font-size:36px;font-weight:700;text-align:center;color:#2e7d32;margin-top:20px">— %</div>
  </div>
</div>

<script>
const TOTAL = 40;
const state = {};
const QLABELS = {
  1:"¿La organización ha identificado los factores internos y externos que afectan al SGC?",
  2:"¿Se revisa periódicamente el contexto de la organización?",
  3:"¿Se han identificado las partes interesadas relevantes y sus requisitos?",
  4:"¿Está claramente definido y documentado el alcance del SGC?",
  5:"¿Se han determinado los procesos necesarios para el SGC y sus interacciones?",
  6:"¿Existen criterios y métodos para asegurar el control de los procesos?",
  7:"¿La alta dirección demuestra liderazgo y compromiso con el SGC?",
  8:"¿Se promueve el enfoque al cliente en todos los niveles?",
  9:"¿Existe una política de calidad documentada, comunicada y entendida?",
  10:"¿Se asignan responsabilidades y autoridades de forma clara?",
  11:"¿La política de calidad incluye el compromiso con la mejora continua?",
  12:"¿Se integra el SGC en los procesos estratégicos de la empresa?",
  13:"¿Se identifican riesgos y oportunidades que pueden afectar al SGC?",
  14:"¿Existe un método para evaluar y tratar riesgos y oportunidades?",
  15:"¿Se establecen objetivos de calidad medibles y coherentes?",
  16:"¿Se planifican los recursos y plazos necesarios para alcanzar los objetivos?",
  17:"¿Se realiza seguimiento y revisión de los objetivos de calidad?",
  18:"¿Se controlan los cambios que afectan al SGC?",
  19:"¿Se proporcionan los recursos necesarios (humanos, infraestructura, ambiente)?",
  20:"¿El personal tiene la competencia requerida para sus funciones?",
  21:"¿Se mantienen registros de capacitación y competencia?",
  22:"¿El personal es consciente de la política de calidad y sus objetivos?",
  23:"¿Existe un proceso efectivo de comunicación interna y externa?",
  24:"¿Se controla adecuadamente la información documentada?",
  25:"¿Se gestionan correctamente documentos y registros?",
  26:"¿Se planifican y controlan los procesos operativos?",
  27:"¿Se determinan y revisan los requisitos de clientes antes de aceptar pedidos?",
  28:"¿Se controla el diseño y desarrollo de productos/servicios cuando aplica?",
  29:"¿Se evalúa, selecciona y monitorea a proveedores externos?",
  30:"¿Se controlan las actividades de producción y prestación del servicio?",
  31:"¿Se asegura la trazabilidad de los productos cuando es necesario?",
  32:"¿Se identifican y controlan los productos o servicios no conformes?",
  33:"¿Se realiza seguimiento, medición y análisis del desempeño del SGC?",
  34:"¿Se mide la satisfacción del cliente de forma regular?",
  35:"¿Se realizan auditorías internas planificadas y efectivas?",
  36:"¿La dirección realiza revisiones periódicas del SGC?",
  37:"¿Se gestionan las no conformidades de manera sistemática?",
  38:"¿Se analizan las causas raíz de las no conformidades?",
  39:"¿Se implementan acciones correctivas y se verifica su eficacia?",
  40:"¿Se promueve y evidencia la mejora continua del SGC?"
};

const sections = [
  {id:"sec4", title:"4. Contexto de la organización", icon:"🌐", count:6, start:1},
  {id:"sec5", title:"5. Liderazgo", icon:"👔", count:6, start:7},
  {id:"sec6", title:"6. Planificación", icon:"📋", count:6, start:13},
  {id:"sec7", title:"7. Soporte", icon:"🛠️", count:7, start:19},
  {id:"sec8", title:"8. Operación", icon:"⚙️", count:7, start:26},
  {id:"sec9", title:"9. Evaluación del desempeño", icon:"📊", count:4, start:33},
  {id:"sec10",title:"10. Mejora", icon:"🔄", count:4, start:37}
];

function init() {
  sections.forEach(sec => {
    const secHTML = `
      <div class="section" id="${sec.id}">
        <div class="section-header" onclick="toggleSection('${sec.id}')">
          <div class="section-icon">${sec.icon}</div>
          <div>
            <h2 style="font-size:18px">${sec.title}</h2>
            <p style="color:#666;font-size:14px">Cláusula ${sec.id.replace('sec','')}</p>
          </div>
          <div style="margin-left:auto;background:#e8f5e9;color:#2e7d32;padding:4px 12px;border-radius:9999px;font-size:13px;font-weight:500">${sec.count} preguntas</div>
        </div>
        <div id="body-${sec.id}"></div>
      </div>`;
    document.querySelector('.main').insertAdjacentHTML('beforeend', secHTML);
    const body = document.getElementById(`body-${sec.id}`);

    for (let i = sec.start; i < sec.start + sec.count; i++) {
      state[i] = {val: null, note: ''};
      const card = document.createElement('div');
      card.className = 'question-card';
      card.id = `qc-${i}`;
      card.innerHTML = `
        <div class="q-header">
          <span class="q-num">${sec.id.replace('sec','')}.${String(i-sec.start+1).padStart(2,'0')}</span>
          <div class="q-text">${QLABELS[i]}</div>
        </div>
        <div class="radio-group" id="rg-${i}"></div>
        <textarea class="q-notes" id="note-${i}" placeholder="Observaciones, evidencias encontradas o acciones correctivas..."></textarea>`;
      body.appendChild(card);
      buildRadios(i);
      document.getElementById(`note-${i}`).addEventListener('input', e => state[i].note = e.target.value);
    }
  });
}

function buildRadios(n) {
  const rg = document.getElementById(`rg-${n}`);
  const options = [
    {v:'C', l:'C — Conforme'},
    {v:'P', l:'PC — Parcialmente conforme'},
    {v:'NC', l:'NC — No conforme'},
    {v:'NA', l:'NA — No aplica'}
  ];
  options.forEach(opt => {
    const lbl = document.createElement('label');
    lbl.className = 'radio-opt';
    lbl.innerHTML = `<input type="radio" name="q${n}" value="${opt.v}"> ${opt.l}`;
    lbl.addEventListener('click', () => selectOpt(n, opt.v, rg));
    rg.appendChild(lbl);
  });
}

function selectOpt(n, val, rg) {
  state[n].val = val;
  rg.querySelectorAll('.radio-opt').forEach(l => l.classList.remove('sel-C','sel-P','sel-NC','sel-NA'));
  const selected = Array.from(rg.children).find(l => l.querySelector('input').value === val);
  if (selected) selected.classList.add(`sel-${val}`);
  updateScore();
}

function updateScore() {
  let c=0, p=0, nc=0, na=0, answered=0;
  for (let i=1; i<=TOTAL; i++) {
    if (state[i]?.val) {
      answered++;
      if (state[i].val === 'C') c++;
      else if (state[i].val === 'P') p++;
      else if (state[i].val === 'NC') nc++;
      else if (state[i].val === 'NA') na++;
    }
  }
  document.getElementById('cnt-c').textContent = c;
  document.getElementById('cnt-p').textContent = p;
  document.getElementById('cnt-nc').textContent = nc;
  document.getElementById('cnt-na').textContent = na;

  const evaluated = answered - na;
  const pct = evaluated > 0 ? Math.round((c / evaluated) * 100) : 0;
  document.getElementById('overall-pct').textContent = pct + ' %';
  document.getElementById('overall-pct').style.color = pct >= 75 ? '#2e7d32' : pct >= 50 ? '#ff9800' : '#f44336';
}

function toggleSection(id) {
  const body = document.getElementById('body-'+id);
  body.style.display = body.style.display === 'none' ? 'block' : 'none';
}

function generateResults() {
  let html = '<h2 style="margin:20px 0 15px">Informe de Resultados</h2>';
  html += '<p style="color:#666;font-size:14px">Generado el ' + new Date().toLocaleDateString('es-ES') + '</p>';

  ['NC','P','C'].forEach(status => {
    const list = Object.keys(state).filter(i => state[i].val === status);
    if (list.length === 0) return;
    const title = status==='NC' ? '❌ No conformidades' : status==='P' ? '⚠️ Parcialmente conformes' : '✅ Conformidades';
    const color = status==='NC' ? '#c62828' : status==='P' ? '#e65100' : '#2e7d32';
    html += `<h3 style="color:${color};margin:25px 0 10px">${title} (${list.length})</h3>`;
    list.forEach(i => {
      const note = state[i].note ? `<div style="font-size:13px;color:#555;margin-top:6px">Nota: ${state[i].note}</div>` : '';
      html += `<div style="padding:14px;background:#f9f9f9;border-left:4px solid ${color};margin-bottom:10px;border-radius:6px">
        <strong>Pregunta ${i}</strong><br>${QLABELS[i]}${note}
      </div>`;
    });
  });

  const panel = document.createElement('div');
  panel.className = 'score-section';
  panel.style.marginTop = '30px';
  panel.innerHTML = html || '<p style="text-align:center;padding:40px;color:#888">Responde las preguntas para ver el informe.</p>';
  document.querySelector('.main').appendChild(panel);
  panel.scrollIntoView({behavior:'smooth'});
}

function resetAll() {
  if (confirm('¿Deseas reiniciar toda la simulación?')) location.reload();
}

init();
</script>
</body>
</html>
