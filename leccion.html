<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lección ISO 9001:2015 - Verificación de Conocimientos</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #2e7d32;
    --primary-dark: #1b5e20;
    --light-bg: #f8f9f8;
    --white: #ffffff;
    --text: #212529;
    --border: #d1d5db;
    --shadow: 0 2px 8px rgba(0,0,0,.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--light-bg);
    color: var(--text);
    min-height: 100vh;
  }
  .header {
    background: var(--primary-dark);
    padding: 18px 30px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: var(--shadow);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .header h1 { font-size: 22px; color: white; font-weight: 600; }
  .btn {
    padding: 10px 20px;
    border-radius: 8px;
    font-weight: 500;
    cursor: pointer;
    border: none;
    margin-left: 10px;
  }
  .btn-secondary { background: white; color: var(--primary-dark); border: 2px solid var(--primary); }
  .btn-primary { background: var(--primary); color: white; }
  .main { max-width: 1100px; margin: 30px auto; padding: 0 20px; }
  .score-section, .results {
    background: var(--white);
    border-radius: 10px;
    padding: 24px;
    margin-bottom: 24px;
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
  }
  .level-selector { display: flex; gap: 12px; flex-wrap: wrap; }
  .level-btn {
    padding: 12px 24px;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
    border: 2px solid var(--primary);
  }
  .level-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
  .question-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
    margin-bottom: 20px;
  }
  .q-header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 14px;
  }
  .q-num {
    background: #e8f5e9;
    color: var(--primary);
    font-weight: 700;
    min-width: 42px;
    height: 42px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 8px;
    font-size: 18px;
  }
  .q-text { font-size: 16px; line-height: 1.5; flex: 1; }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option {
    padding: 12px 16px;
    border: 2px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
  }
  .option:hover { background: #f8f9f8; }
  .option.selected { border-color: var(--primary); background: #e8f5e9; }
  .fill-input {
    width: 100%;
    padding: 12px;
    border: 2px solid var(--border);
    border-radius: 8px;
    font-size: 16px;
  }
  .back-btn {
    background: #555;
    color: white;
    padding: 10px 18px;
    border-radius: 8px;
    cursor: pointer;
    margin-bottom: 20px;
  }
</style>
</head>
<body>

<div class="header">
  <h1>Lección Interactiva — ISO 9001:2015</h1>
  <div>
    <button onclick="goToHome()" class="btn btn-secondary">← Regresar al Inicio</button>
    <button onclick="resetAll()" class="btn btn-secondary">↺ Reiniciar</button>
  </div>
</div>

<div class="main">
  <!-- Selector de nivel -->
  <div id="home-screen">
    <div class="score-section">
      <h2 style="margin-bottom:16px">Seleccione el nivel</h2>
      <div class="level-selector">
        <button onclick="startLevel(0)" id="lvl-0" class="level-btn active">Básico — 25 preguntas (100 puntos)</button>
        <button onclick="startLevel(1)" id="lvl-1" class="level-btn">Intermedio — 50 preguntas (100 puntos)</button>
        <button onclick="startLevel(2)" id="lvl-2" class="level-btn">Avanzado — 100 preguntas (100 puntos)</button>
      </div>
    </div>
  </div>

  <!-- Área del cuestionario -->
  <div id="quiz-area" style="display:none">
    <button onclick="goToHome()" class="back-btn">← Regresar al selector de niveles</button>
    <div class="score-section">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span id="level-title" style="font-size:22px;font-weight:600;color:var(--primary-dark)"></span>
        <span id="progress-info" style="color:#555"></span>
      </div>
    </div>
    <div id="questions-container"></div>
    <div style="text-align:center;margin:30px 0">
      <button onclick="gradeQuiz()" class="btn btn-primary">Calificar y ver resultados</button>
      <button onclick="printPDF()" class="btn btn-secondary">Imprimir / PDF</button>
    </div>
  </div>

  <!-- Resultados -->
  <div id="results-panel" class="results" style="display:none"></div>
</div>

// ==================== FUNCIONES ====================
function goToHome() {
  document.getElementById('quiz-area').style.display = 'none';
  document.getElementById('results-panel').style.display = 'none';
  document.getElementById('home-screen').style.display = 'block';
}

function startLevel(lvl) {
  currentLevel = lvl;
  currentQuestions = allQuestions[lvl];
  userAnswers = {};
  document.getElementById('home-screen').style.display = 'none';
  document.getElementById('quiz-area').style.display = 'block';
  document.getElementById('results-panel').style.display = 'none';
  document.getElementById('level-title').textContent = levelsConfig[lvl].name + " — " + currentQuestions.length + " preguntas";
  renderQuestions();
}

function renderQuestions() {
  const container = document.getElementById('questions-container');
  container.innerHTML = '';
  currentQuestions.forEach((q, idx) => {
    const card = document.createElement('div');
    card.className = 'question-card';
    card.innerHTML = `
      <div class="q-header">
        <div class="q-num">${idx + 1}</div>
        <div class="q-text">${q.q}</div>
      </div>`;
    const optsDiv = document.createElement('div');
    optsDiv.className = 'options';
    if (q.type === "tf") {
      optsDiv.append(createOption("Verdadero", "true", q.id));
      optsDiv.append(createOption("Falso", "false", q.id));
    } else if (q.type === "mcq" || q.type === "case") {
      q.options.forEach((opt, i) => {
        optsDiv.append(createOption(opt, i, q.id));
      });
    } else if (q.type === "fill") {
      const input = document.createElement('input');
      input.type = "text";
      input.className = "fill-input";
      input.placeholder = "Escriba su respuesta aquí...";
      input.oninput = () => userAnswers[q.id] = input.value.trim();
      optsDiv.appendChild(input);
    }
    card.appendChild(optsDiv);
    container.appendChild(card);
  });
  document.getElementById('progress-info').textContent = `0 / ${currentQuestions.length}`;
}

function createOption(text, value, qId) {
  const div = document.createElement('div');
  div.className = 'option';
  div.textContent = text;
  div.onclick = () => {
    userAnswers[qId] = value;
    const parent = div.parentElement;
    Array.from(parent.children).forEach(child => child.classList.remove('selected'));
    div.classList.add('selected');
  };
  return div;
}

function gradeQuiz() {
  let correctCount = 0;
  let html = `<h2>Resultados — ${levelsConfig[currentLevel].name}</h2>`;
  currentQuestions.forEach(q => {
    const userAns = userAnswers[q.id];
    let isCorrect = false;
    if (q.type === "tf" || q.type === "mcq" || q.type === "case") {
      isCorrect = String(userAns) === String(q.correct);
    } else if (q.type === "fill") {
      isCorrect = userAns && userAns.toLowerCase() === q.correct.toLowerCase();
    }
    if (isCorrect) correctCount++;
    html += `
      <div style="padding:18px;margin-bottom:14px;border-radius:8px;background:${isCorrect?'#e8f5e9':'#ffebee'};border-left:6px solid ${isCorrect?'#4caf50':'#f44336'}">
        <strong>Pregunta ${q.id}:</strong> ${q.q}<br>
        <span style="color:#555">Tu respuesta: ${userAns !== undefined ? userAns : 'Sin responder'}</span><br>
        <strong style="color:${isCorrect?'#2e7d32':'#c62828'}">Respuesta correcta: ${q.expl}</strong>
      </div>`;
  });
  const percentage = Math.round((correctCount / currentQuestions.length) * 100);
  html = html.replace('<h2>', `<p style="font-size:20px;margin:20px 0">Puntaje obtenido: <strong>${percentage}</strong> / 100 puntos</p><h2>`);
  document.getElementById('results-panel').innerHTML = html;
  document.getElementById('results-panel').style.display = 'block';
  document.getElementById('results-panel').scrollIntoView({behavior:'smooth'});
}

function printPDF() {
  window.print();
}

function resetAll() {
  if (confirm('¿Desea reiniciar todo?')) location.reload();
}

window.onload = () => {
  document.getElementById('home-screen').style.display = 'block';
};
</script>
